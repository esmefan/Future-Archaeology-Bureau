<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>未来考古局 - Future Archaeology Bureau</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">未来考古局</h1>
                <nav class="main-nav">
                    <button class="nav-btn active" data-view="feed">
                        <i class="fas fa-archive"></i>
                        <span>遗物档案</span>
                    </button>
                    <button class="nav-btn" data-view="timeline">
                        <i class="fas fa-timeline"></i>
                        <span>时间线</span>
                    </button>
                    <button class="nav-btn" data-view="profile">
                        <i class="fas fa-user"></i>
                        <span>个人中心</span>
                    </button>
                    <button class="nav-btn" data-view="generator">
                        <i class="fas fa-wand-magic-sparkles"></i>
                        <span>生成遗物</span>
                    </button>
                </nav>
            </div>
        </header>

        <!-- 主要内容区域 -->
        <main class="main-content">
            <!-- Feed页面 -->
            <div id="feed-view" class="view active">
                <div class="feed-header">
                    <h2>遗物档案</h2>
                    <p class="subtitle">探索来自未来的科幻遗物</p>
                </div>
                <div id="relics-container" class="relics-container">
                    <!-- 遗物卡片将通过JS动态加载 -->
                </div>
            </div>

            <!-- Timeline页面 -->
            <div id="timeline-view" class="view">
                <div class="placeholder-view">
                    <i class="fas fa-timeline fa-3x"></i>
                    <h2>时间线</h2>
                    <p>开发中...</p>
                </div>
            </div>

            <!-- Profile页面 -->
            <div id="profile-view" class="view">
                <div class="placeholder-view">
                    <i class="fas fa-user fa-3x"></i>
                    <h2>个人中心</h2>
                    <p>开发中...</p>
                </div>
            </div>

            <!-- Generator页面 -->
            <div id="generator-view" class="view">
                <div class="generator-container">
                    <div class="generator-header">
                        <h2>遗物生成器</h2>
                        <p class="subtitle">选择两个分类组合，AI 将生成全新的科幻遗物档案</p>
                    </div>

                    <div class="picker-container">
                        <label class="picker-label">分类 1</label>
                        <select id="category1" class="category-picker">
                            <!-- 分类选项将通过JS动态加载 -->
                        </select>
                    </div>

                    <div class="picker-container">
                        <label class="picker-label">分类 2</label>
                        <select id="category2" class="category-picker">
                            <!-- 分类选项将通过JS动态加载 -->
                        </select>
                    </div>

                    <button id="generate-btn" class="generate-btn">
                        <i class="fas fa-wand-magic-sparkles"></i>
                        AI 生成档案
                    </button>

                    <div id="error-box" class="error-box hidden">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="error-text"></span>
                    </div>

                    <div id="preview-section" class="preview-section hidden">
                        <h3 class="preview-title">生成预览</h3>
                        <div id="preview-card" class="preview-card">
                            <!-- 预览内容将通过JS动态加载 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Relic Detail页面 -->
            <div id="detail-view" class="view">
                <!-- 遗物详情内容将通过JS动态加载 -->
            </div>
        </main>

        <!-- 底部信息 -->
        <footer class="footer">
            <p>未来考古局 © 2026 - 探索未来的科幻遗物</p>
        </footer>
    </div>

    <!-- 加载指示器 -->
    <div id="loading" class="loading-overlay hidden">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>AI正在生成遗物档案...</p>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
